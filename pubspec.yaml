name: recording_challenge
description: "Note Recorder Flutter Take-Home Challenge — Recording screen with AI processing"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0-210.2.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Code generation / sealed classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Speech-to-text (device-native, handles microphone access)
  speech_to_text: ^7.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Networking (for OpenAI/Gemini API)
  dio: ^5.7.0

  # SDKs
  adjust_sdk: ^5.6.0
  adapty_flutter: ^3.15.5

  # Environment variables
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  riverpod_generator: ^2.6.2
  json_serializable: ^6.9.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
          weight: 400
